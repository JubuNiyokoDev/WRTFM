openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Worldwide Rapid Task For Money - Verification Automation Engine
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: campaigns
    description: Campaign management
  - name: tasks
    description: Task management
  - name: assignments
    description: Task assignments
  - name: proofs
    description: Proof submission
  - name: verifications
    description: Verification engine
  - name: users
    description: User management
  - name: wallet
    description: Wallet and payments
  - name: payments
    description: External payment provider integrations
  - name: dashboard
    description: Dashboard summaries
  - name: reputation
    description: Reputation system
  - name: kyc
    description: Burundi KYC verification and compliance review

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Auth
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # Campaigns
  /campaigns:
    get:
      operationId: listCampaigns
      tags: [campaigns]
      summary: List campaigns
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, active, paused, completed, cancelled]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of campaigns
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignList"
    post:
      operationId: createCampaign
      tags: [campaigns]
      summary: Create a campaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampaignInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"

  /campaigns/{id}:
    get:
      operationId: getCampaign
      tags: [campaigns]
      summary: Get a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateCampaign
      tags: [campaigns]
      summary: Update a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampaignUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
    delete:
      operationId: deleteCampaign
      tags: [campaigns]
      summary: Delete a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /campaigns/{id}/stats:
    get:
      operationId: getCampaignStats
      tags: [campaigns]
      summary: Get campaign statistics
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Campaign stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignStats"

  /campaigns/{id}/tasks:
    get:
      operationId: getCampaignTasks
      tags: [campaigns]
      summary: List tasks for a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"

  # Tasks
  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List tasks
      parameters:
        - name: campaignId
          in: query
          schema:
            type: integer
        - name: type
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskList"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/available:
    get:
      operationId: listAvailableTasks
      tags: [tasks]
      summary: List tasks available for workers
      parameters:
        - name: type
          in: query
          schema:
            type: string
        - name: platform
          in: query
          schema:
            type: string
        - name: minReward
          in: query
          schema:
            type: number
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Available tasks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskList"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  # Assignments
  /assignments:
    get:
      operationId: listAssignments
      tags: [assignments]
      summary: List assignments
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, in_progress, submitted, approved, rejected, expired]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of assignments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignmentList"
    post:
      operationId: claimTask
      tags: [assignments]
      summary: Claim a task (worker)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimInput"
      responses:
        "201":
          description: Claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assignment"

  /assignments/{id}:
    get:
      operationId: getAssignment
      tags: [assignments]
      summary: Get an assignment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Assignment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assignment"

  /assignments/{id}/submit:
    post:
      operationId: submitProof
      tags: [assignments]
      summary: Submit proof for an assignment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProofInput"
      responses:
        "200":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationResult"

  # Verifications
  /verifications:
    get:
      operationId: listVerifications
      tags: [verifications]
      summary: List verification results
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum:
              [
                pending,
                auto_approved,
                auto_rejected,
                manual_review,
                approved,
                rejected,
              ]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of verifications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationList"

  /verifications/{id}:
    get:
      operationId: getVerification
      tags: [verifications]
      summary: Get a verification result
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationResult"

  /verifications/{id}/review:
    post:
      operationId: reviewVerification
      tags: [verifications]
      summary: Manual review of a verification (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewInput"
      responses:
        "200":
          description: Reviewed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationResult"

  # Users (admin)
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users (admin)
      parameters:
        - name: role
          in: query
          schema:
            type: string
            enum: [client, worker, admin]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserList"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}/reputation:
    get:
      operationId: getUserReputation
      tags: [users]
      summary: Get a user's reputation details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reputation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReputationDetail"

  /users/me/kyc/history:
    get:
      operationId: listMyKycHistory
      tags: [kyc]
      summary: List current user's KYC verification history
      responses:
        "200":
          description: KYC history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KycVerificationList"

  /admin/kyc-verifications:
    get:
      operationId: listAdminKycVerifications
      tags: [kyc]
      summary: List KYC verifications for compliance review
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [approved, rejected, manual_review]
        - name: userId
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: KYC verifications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KycVerificationList"

  /admin/kyc-verifications/{id}:
    get:
      operationId: getAdminKycVerification
      tags: [kyc]
      summary: Get one KYC verification with masked secure details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: KYC verification detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KycVerification"

  /admin/kyc-verifications/{id}/decision:
    post:
      operationId: decideAdminKycVerification
      tags: [kyc]
      summary: Approve or reject a KYC verification after compliance review
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KycReviewDecisionInput"
      responses:
        "200":
          description: KYC compliance decision applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KycReviewDecisionResponse"

  /admin/kyc-verifications/{id}/files/{kind}:
    get:
      operationId: getAdminKycVerificationFile
      tags: [kyc]
      summary: Fetch one private KYC evidence file for admin review
      description: Requires admin authentication. Documents and liveness frames are never exposed publicly.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: kind
          in: path
          required: true
          schema:
            type: string
            enum: [front, back, liveFace, blink, head_turn, mouth]
        - name: index
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
          description: Frame index for liveness segment files.
      responses:
        "200":
          description: Private evidence image
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Admin role required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users/{id}/kyc/reset:
    post:
      operationId: resetUserKyc
      tags: [kyc]
      summary: Reset a user's permanent KYC status for compliance reasons
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        "200":
          description: KYC reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageUserResponse"

  # Wallet
  /wallet:
    get:
      operationId: getWallet
      tags: [wallet]
      summary: Get current user's wallet
      responses:
        "200":
          description: Wallet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"

  /wallet/transactions:
    get:
      operationId: listTransactions
      tags: [wallet]
      summary: List wallet transactions
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionList"

  /wallet/deposit:
    post:
      operationId: depositFunds
      tags: [wallet]
      summary: Manual deposit funds
      description: Disabled by default. Use /payments/crypto/deposit for production client funding.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepositInput"
      responses:
        "200":
          description: Deposit initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "410":
          description: Manual deposits disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /payments/crypto/deposit:
    post:
      operationId: createCryptoDeposit
      tags: [payments]
      summary: Create a NOWPayments crypto deposit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CryptoDepositInput"
      responses:
        "201":
          description: Crypto payment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CryptoDepositResponse"
        "503":
          description: Payment provider not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /payments/nowpayments/ipn:
    post:
      operationId: handleNowpaymentsIpn
      tags: [payments]
      summary: Handle NOWPayments signed IPN callback
      responses:
        "200":
          description: IPN processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Invalid IPN signature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /wallet/withdraw:
    post:
      operationId: withdrawFunds
      tags: [wallet]
      summary: Create a NOWPayments payout withdrawal
      description: Debits the USD wallet only after NOWPayments accepts the payout request. `method` is the NOWPayments payout currency code, `accountDetails` is the crypto address or ChangeNOW PRO email.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawInput"
      responses:
        "200":
          description: Withdrawal initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  # Dashboard summaries (wow endpoints)
  /dashboard/client-summary:
    get:
      operationId: getClientSummary
      tags: [dashboard]
      summary: Client dashboard summary
      responses:
        "200":
          description: Client summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientSummary"

  /dashboard/worker-summary:
    get:
      operationId: getWorkerSummary
      tags: [dashboard]
      summary: Worker dashboard summary
      responses:
        "200":
          description: Worker summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerSummary"

  /dashboard/admin-summary:
    get:
      operationId: getAdminSummary
      tags: [dashboard]
      summary: Admin dashboard summary
      responses:
        "200":
          description: Admin summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSummary"

  /dashboard/activity-feed:
    get:
      operationId: getActivityFeed
      tags: [dashboard]
      summary: Recent activity feed
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEvent"

  /dashboard/automation-stats:
    get:
      operationId: getAutomationStats
      tags: [dashboard]
      summary: Verification automation statistics
      responses:
        "200":
          description: Automation stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationStats"

  /dashboard/task-type-breakdown:
    get:
      operationId: getTaskTypeBreakdown
      tags: [dashboard]
      summary: Task counts broken down by type and platform
      responses:
        "200":
          description: Task type breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaskTypeCount"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    # Auth
    RegisterInput:
      type: object
      required: [email, password, role, name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        name:
          type: string
        role:
          type: string
          enum: [client, worker]
        country:
          type: string
        language:
          type: string
          enum: [fr, en]

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    # User
    User:
      type: object
      required: [id, email, name, role, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [client, worker, admin]
        country:
          type: ["string", "null"]
        language:
          type: string
          enum: [fr, en]
        avatarUrl:
          type: ["string", "null"]
        isActive:
          type: boolean
        reputationScore:
          type: number
        createdAt:
          type: string
          format: date-time

    UserList:
      type: object
      required: [items, total, page, limit]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    KycVerification:
      type: object
      required: [id, userId, status, confidence, reason, documentType, method, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        status:
          type: string
          enum: [approved, rejected, manual_review]
        confidence:
          type: number
        reason:
          type: string
        documentType:
          type: string
        method:
          type: string
        officialNumber:
          type: ["string", "null"]
        duplicateSignals:
          type: object
          additionalProperties: true
        storageFiles:
          type: ["object", "null"]
          additionalProperties: true
          description: Private storage metadata only. No public document URL is exposed.
        fileAccess:
          anyOf:
            - $ref: "#/components/schemas/KycFileAccess"
            - type: "null"
          description: Admin-only secure fetch URLs for private KYC evidence.
        reviewedBy:
          type: ["integer", "null"]
        reviewReason:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        reviewedAt:
          type: ["string", "null"]
          format: date-time
        result:
          type: object
          additionalProperties: true
          description: Masked decrypted engine result for admin detail view.

    KycFileAccess:
      type: object
      required: [direct, livenessSegments]
      properties:
        direct:
          type: array
          items:
            $ref: "#/components/schemas/KycFileLink"
        livenessSegments:
          type: array
          items:
            type: object
            required: [challenge, frames]
            properties:
              challenge:
                type: string
                enum: [blink, head_turn, mouth]
              frames:
                type: array
                items:
                  $ref: "#/components/schemas/KycFrameLink"

    KycFileLink:
      type: object
      required: [kind, label, url]
      properties:
        kind:
          type: string
        label:
          type: string
        mimeType:
          type: ["string", "null"]
        size:
          type: ["integer", "null"]
        url:
          type: string

    KycFrameLink:
      type: object
      required: [index, label, url]
      properties:
        index:
          type: integer
        label:
          type: string
        mimeType:
          type: ["string", "null"]
        size:
          type: ["integer", "null"]
        url:
          type: string

    KycVerificationList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/KycVerification"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    KycReviewDecisionInput:
      type: object
      required: [decision]
      properties:
        decision:
          type: string
          enum: [approved, rejected]
        reviewReason:
          type: string

    KycReviewDecisionResponse:
