        budget:
          type: number
        rewardPerTask:
          type: number
        workersNeeded:
          type: integer
        targetCountries:
          type: array
          items:
            type: string
        targetLanguages:
          type: array
          items:
            type: string
        deadline:
          type: string
          format: date-time
        instructions:
          type: string
        proofRequirements:
          type: array
          items:
            type: string

    CampaignUpdate:
